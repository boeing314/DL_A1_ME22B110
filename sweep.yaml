program: src/train.py

method: bayes

metric:
  name: f1
  goal: maximize

parameters:

  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  hidden_size:
    values:
      - [64,64]
      - [128,128]
      - [128,128,128]